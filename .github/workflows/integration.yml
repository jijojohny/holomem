name: Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: holomem
          POSTGRES_USER: holomem
          POSTGRES_PASSWORD: holomem_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://holomem:holomem_ci@localhost:5433/holomem
      BRAGA_RPC_URL: https://braga.hoodi.arkiv.network/rpc
      # Pool wallet — funded testnet key stored as repo secret
      POOL_WALLET_PRIVATE_KEY: ${{ secrets.POOL_WALLET_PRIVATE_KEY }}
      PORT: 3001
      LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Apply database schema
        run: npm run db:migrate

      - name: Start API server
        run: |
          node apps/api/dist/index.js &
          echo $! > /tmp/api.pid

      - name: Wait for API server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          exit 1

      - name: Run integration tests
        run: npm run test:integration

      - name: Stop API server
        if: always()
        run: kill $(cat /tmp/api.pid) 2>/dev/null || true
