services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holomem
      POSTGRES_USER: holomem
      POSTGRES_PASSWORD: holomem_dev
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
