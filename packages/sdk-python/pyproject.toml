[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "holomem"
version = "0.1.0"
description = "HoloMem Python SDK — encrypted persistent memory for AI agents"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "eciespy>=0.4.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["holomem"]
